name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            os: macos-latest
          - target: macos-x64
            os: macos-13
          - target: linux-x64
            os: ubuntu-latest
          - target: windows-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release binaries
        shell: bash
        run: bash scripts/build-release.sh ${{ matrix.target }}

      - name: Code sign (macOS)
        if: startsWith(matrix.target, 'macos-')
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          for bin in \
            "dist-release/${TARGET}/pedrito-${TARGET}" \
            "dist-release/${TARGET}/pedrito-engram-${TARGET}" \
            "dist-release/${TARGET}/gga-${TARGET}"; do
            codesign --deep --force --sign - "$bin"
          done

      - name: Regenerate checksums after signing (macOS)
        if: startsWith(matrix.target, 'macos-')
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          cd "dist-release/${TARGET}"
          for bin in "pedrito-${TARGET}" "pedrito-engram-${TARGET}" "gga-${TARGET}"; do
            shasum -a 256 "$bin" > "${bin}.sha256"
          done
          # Recreate tar.gz after signing
          TARBALL="pedrito-${TARGET}.tar.gz"
          tar -czf "${TARBALL}" "pedrito-${TARGET}" "pedrito-engram-${TARGET}" "gga-${TARGET}"
          shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pedrito-${{ matrix.target }}
          path: dist-release/${{ matrix.target }}/
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-files
          find dist-release/ -type f | while read f; do
            cp "$f" release-files/
          done
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pedrito v${{ steps.version.outputs.VERSION }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-files/*
          body: |
            ## Pedrito v${{ steps.version.outputs.VERSION }}

            ### Install

            **macOS / Linux (recommended):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            **Homebrew (macOS):**
            ```bash
            brew tap ${{ github.repository_owner }}/pedrito
            brew install pedrito
            ```

            **Direct download:**
            | Platform | Binary |
            |---|---|
            | macOS ARM64 | `pedrito-macos-arm64` |
            | macOS x64   | `pedrito-macos-x64` |
            | Linux x64   | `pedrito-linux-x64` |
            | Windows x64 | `pedrito-windows-x64.exe` |

            Verify checksums: each binary has a corresponding `.sha256` file.

            ### After install
            ```bash
            pedrito version   # verify installation
            pedrito install   # set up Pedrito in a project
            ```
