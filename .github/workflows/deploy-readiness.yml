name: Deploy Readiness

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  deploy-readiness:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Deploy Domains Manifest
        run: |
          [ -f "kit/registry/deploy_domains.json" ] || exit 1
          python - <<'PY'
          import json
          with open("kit/registry/deploy_domains.json") as f:
              data = json.load(f)
              domains = data.get("domains", {})
              for name, conf in domains.items():
                  assert "required_checks" in conf
                  assert "build" in conf["required_checks"] or "smoke" in conf["required_checks"]
          print("Deploy domains validated.")
          PY
      - name: Check Deploy Workflow Exists
        run: |
          [ -f "kit/workflows/deploy_workflow.md" ] || exit 1
          grep -q "deploy-orchestrator" kit/workflows/deploy_workflow.md
      - name: Validate Official Sync Script
        run: |
          [ -f "kit/scripts/sync-workspace.sh" ] || exit 1
      - name: Verify V3 Core Rules for Deploy
        run: |
          [ -f "kit/core/10_deploy_rules.md" ] || exit 1
          grep -q "Preflight" kit/core/10_deploy_rules.md
          grep -q "rollback" kit/core/10_deploy_rules.md
