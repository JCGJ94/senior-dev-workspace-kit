name: Build & Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck all packages
        run: bun run typecheck

      - name: Test all packages
        run: bun run test

      - name: Build all packages
        run: bun run build

      - name: Smoke test — pedrito version
        run: ./packages/installer/dist/pedrito version

      - name: Smoke test — engram version
        run: ./packages/engram/dist/engram version

      - name: Smoke test — gga version
        run: ./packages/gga/dist/gga version
