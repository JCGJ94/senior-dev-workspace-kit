<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <!-- Premium Dark Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050812" />
      <stop offset="50%" stop-color="#0a0f1a" />
      <stop offset="100%" stop-color="#030509" />
    </linearGradient>

    <!-- Node Halo Glow -->
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters for Neon Blur and Depth -->
    <filter id="neonBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Frame Background -->
  <rect width="800" height="300" rx="16" fill="url(#bgGrad)" />

  <!-- Cyber / Tech Grid Pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#101d36" stroke-width="1.2" opacity="0.6"/>
    <circle cx="0" cy="0" r="1.5" fill="#3b82f6" opacity="0.3" />
    <circle cx="60" cy="60" r="1.5" fill="#3b82f6" opacity="0.3" />
  </pattern>
  <rect width="800" height="300" rx="16" fill="url(#grid)"/>

  <!-- Tech Floating Node Particles -->
  <g fill="#00f0ff" opacity="0.4" filter="url(#neonBlur)">
    <circle cx="700" cy="60" r="2.5"/>
    <circle cx="630" cy="110" r="1.5"/>
    <circle cx="760" cy="230" r="2"/>
    <circle cx="560" cy="270" r="1"/>
    <circle cx="100" cy="50" r="2"/>
    <circle cx="50" cy="220" r="1.5"/>
  </g>

  <!-- Left Side: Android Node -->
  <g transform="translate(130, 150)">
    <!-- Base Halo -->
    <circle cx="0" cy="0" r="95" fill="url(#hubGlow)" />
    
    <!-- Outer Cyber Rings -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#1e3a8a" stroke-width="2" stroke-dasharray="2 8" opacity="0.6"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="15 6" opacity="0.4"/>

    <!-- Android Cyber Head with Drop Shadow -->
    <g filter="url(#dropShadow)">
      <!-- Cybernetic Cranium / Base Shield -->
      <path d="M 0 -70 C 40 -70 60 -35 55 5 L 40 40 L 20 65 L 0 80 L -20 65 L -40 40 L -55 5 C -60 -35 -40 -70 0 -70 Z" fill="#060b13" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round" />
      
      <!-- Inner Cyber Interface Plates -->
      <path d="M 0 -30 L 30 -30 L 40 10 L 25 45 L 0 55 L -25 45 L -40 10 L -30 -30 Z" fill="#1e293b" stroke="#00f0ff" stroke-width="1.5" opacity="0.5" stroke-linejoin="round"/>
      
      <!-- Forehead/Crown Details -->
      <path d="M -15 -68 L -25 -45 M 15 -68 L 25 -45" fill="none" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="-70" x2="0" y2="-30" stroke="#00f0ff" stroke-width="2" opacity="0.9" filter="url(#neonBlur)"/>
      <circle cx="0" cy="-30" r="4" fill="#00f0ff" filter="url(#neonBlur)"/>
      
      <!-- Glowing Cyborg Eyes -->
      <!-- Left Eye -->
      <path d="M -30 -5 L -5 5 L -5 15 L -35 0 Z" fill="#00f0ff" filter="url(#neonBlur)" />
      <path d="M -30 -5 L -5 5 L -5 15 L -35 0 Z" fill="#ffffff" opacity="0.9"/>
      <!-- Right Eye -->
      <path d="M 30 -5 L 5 5 L 5 15 L 35 0 Z" fill="#00f0ff" filter="url(#neonBlur)" />
      <path d="M 30 -5 L 5 5 L 5 15 L 35 0 Z" fill="#ffffff" opacity="0.9"/>
      
      <!-- Tech Lines/Nodes below eyes -->
      <circle cx="-20" cy="25" r="2" fill="#3b82f6"/>
      <circle cx="20" cy="25" r="2" fill="#3b82f6"/>
      <line x1="-15" y1="20" x2="-25" y2="28" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="15" y1="20" x2="25" y2="28" stroke="#3b82f6" stroke-width="1.5"/>

      <!-- Mouth Intake Grill -->
      <path d="M -18 35 L 18 35 L 12 48 L -12 48 Z" fill="#020408" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="-10" y1="41" x2="10" y2="41" stroke="#00f0ff" stroke-width="2" filter="url(#neonBlur)" />
    </g>
  </g>

  <!-- Right Side: Clean Typography and Layout (Shifted Left for proper centered margin and anti-cutoff) -->
  <g transform="translate(260, 0)">
    <!-- Core Title -->
    <text x="0" y="145" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="66" font-weight="900" fill="#f8fafc" letter-spacing="-1">PEDRITO</text>
    
    <!-- Subtitle -->
    <text x="5" y="185" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="2.5">AI ORCHESTRATOR FOR DEVELOPER WORKFLOW AUTOMATION</text>

    <!-- Chips Row with explicit geometry alignment (Optimized text rendering) -->
    <g transform="translate(5, 215)" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" text-rendering="optimizeLegibility">

      <!-- TAG 1: Analyzer -->
      <g filter="url(#dropShadow)" transform="translate(0, 0)">
        <rect x="0" y="0" width="90" height="30" rx="6" fill="#0B1220" stroke="#3b82f6" stroke-width="1.5" />
        <text x="45" y="19.5" fill="#93c5fd" text-anchor="middle">Analyzer</text>
      </g>

      <!-- TAG 2: Debugger -->
      <g filter="url(#dropShadow)" transform="translate(103, 0)">
        <rect x="0" y="0" width="95" height="30" rx="6" fill="#0B1220" stroke="#8b5cf6" stroke-width="1.5" />
        <text x="47.5" y="19.5" fill="#c4b5fd" text-anchor="middle">Debugger</text>
      </g>

      <!-- TAG 3: Docs + Prompts -->
      <g filter="url(#dropShadow)" transform="translate(211, 0)">
        <rect x="0" y="0" width="125" height="30" rx="6" fill="#0B1220" stroke="#10b981" stroke-width="1.5" />
        <text x="62.5" y="19.5" fill="#6ee7b7" text-anchor="middle">Docs · Prompts</text>
      </g>

      <!-- TAG 4: Orchestrator -->
      <g filter="url(#dropShadow)" transform="translate(349, 0)">
        <rect x="0" y="0" width="118" height="30" rx="6" fill="#0B1220" stroke="#f59e0b" stroke-width="1.5" />
        <text x="59" y="19.5" fill="#fcd34d" text-anchor="middle">Orchestrator</text>
      </g>

    </g>
  </g>
</svg>
